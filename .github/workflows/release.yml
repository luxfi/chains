name: Build VM Plugins

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      images: ${{ steps.load.outputs.images }}
    steps:
      - uses: actions/checkout@v4
      - id: load
        run: echo "images=$(jq -c . .github/images.json)" >> "$GITHUB_OUTPUT"

  build:
    needs: plan
    if: github.event_name != 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJson(needs.plan.outputs.images) }}
    uses: hanzoai/.github/.github/workflows/docker-build.yml@main
    with:
      image: ${{ matrix.image.image }}
      dockerfile: Dockerfile.plugin
      build-args: |
        VM=${{ matrix.image.vm }}
      pre-build-command: |
        mkdir -p build
        export GONOSUMCHECK=github.com/luxfi/*
        export GONOSUMDB=github.com/luxfi/*
        export CGO_ENABLED=${{ matrix.image.cgo }}
        export CGO_CFLAGS="${{ matrix.image.cgo == '1' && '-O2 -D__BLST_PORTABLE__' || '' }}"
        if [ -f ${{ matrix.image.vm }}/main.go ]; then
          go build -trimpath -ldflags="-s -w" -o build/${{ matrix.image.vm }} ./${{ matrix.image.vm }}
        else
          go build -trimpath -ldflags="-s -w" -o build/${{ matrix.image.vm }} ./${{ matrix.image.vm }}/cmd/plugin
        fi
    secrets: inherit
